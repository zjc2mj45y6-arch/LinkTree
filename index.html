<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis redes | Linktree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="profile" aria-label="Perfil">
      <img class="avatar" src="assets/profile.jpg" alt="Foto de perfil de Dinterr">
      <p class="eyebrow">Streamer y videos cortos</p>
      <h1>Dinterr</h1>
      <p class="bio">Encuentra mis streams en Kick y mis clips en YouTube y TikTok.</p>
    </section>

    <section class="links" aria-label="Redes sociales">
      <a class="social-link kick" href="https://kick.com/dinterr" target="_blank" rel="noopener noreferrer" data-platform="Kick">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M4 3h7v5h2V6h2V3h5v6h-2v2h-2v2h2v2h2v6h-5v-3h-2v-2h-2v5H4V3Z"/>
          </svg>
        </span>
        <span>
          <strong>Kick</strong>
          <small>Streams en vivo</small>
        </span>
        <span class="arrow" aria-hidden="true">-></span>
      </a>

      <a class="social-link youtube" href="https://www.youtube.com/@andreellr" target="_blank" rel="noopener noreferrer" data-platform="YouTube">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M21.6 7.2c-.2-.9-.9-1.6-1.8-1.8C18.2 5 12 5 12 5s-6.2 0-7.8.4c-.9.2-1.6.9-1.8 1.8C2 8.8 2 12 2 12s0 3.2.4 4.8c.2.9.9 1.6 1.8 1.8 1.6.4 7.8.4 7.8.4s6.2 0 7.8-.4c.9-.2 1.6-.9 1.8-1.8.4-1.6.4-4.8.4-4.8s0-3.2-.4-4.8ZM10 15V9l5.2 3L10 15Z"/>
          </svg>
        </span>
        <span>
          <strong>YouTube</strong>
          <small>Videos cortos</small>
        </span>
        <span class="arrow" aria-hidden="true">-></span>
      </a>

      <a class="social-link tiktok" href="https://www.tiktok.com/@dinterk0" target="_blank" rel="noopener noreferrer" data-platform="TikTok">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M16.8 3c.3 2.2 1.6 3.6 3.7 3.8v4.1c-1.4.1-2.7-.3-3.8-1.1v5.7c0 3.9-2.6 6.5-6.2 6.5-3.3 0-6-2.4-6-5.8 0-3.7 2.9-6.1 6.7-5.8v4.2c-1.6-.5-2.8.3-2.8 1.6 0 1.1.9 1.9 2 1.9 1.2 0 2-.7 2-2.3V3h4.4Z"/>
          </svg>
        </span>
        <span>
          <strong>TikTok</strong>
          <small>Clips y contenido corto</small>
        </span>
        <span class="arrow" aria-hidden="true">-></span>
      </a>

      <a class="social-link instagram" href="https://www.instagram.com/andreellr/" target="_blank" rel="noopener noreferrer" data-platform="Instagram">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm8.2 3H8A3 3 0 0 0 5 8v8a3 3 0 0 0 3 3h8a3 3 0 0 0 3-3V8a3 3 0 0 0-3-3Zm-4 2.8A4.2 4.2 0 1 1 12 16.2 4.2 4.2 0 0 1 12 7.8Zm0 2.8a1.4 1.4 0 1 0 0 2.8 1.4 1.4 0 0 0 0-2.8Zm4.6-3.2a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/>
          </svg>
        </span>
        <span>
          <strong>Instagram</strong>
          <small>Cuenta personal</small>
        </span>
        <span class="arrow" aria-hidden="true">-></span>
      </a>
    </section>

    <footer>
      <span id="year"></span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
